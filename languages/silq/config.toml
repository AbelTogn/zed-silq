name = "Silq"
grammar = "silq"
path_suffixes = ["slq"]
line_comments = ["//"]
block_comments = [{start = "/*", end = "*/"}]
brackets = [
    { start = "(", end = ")", close = true, newline = true },
    { start = "[", end = "]", close = true, newline = true },
    { start = "{", end = "}", close = true, newline = true },
]
